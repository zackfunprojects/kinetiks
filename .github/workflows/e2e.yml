# End-to-end (Playwright) — the program's E2E layer (Phase 8.8).
#
# Boots the local Supabase stack (same pinned CLI as rls-tests.yml), builds
# apps/id, and runs the API-lane specs against the real Node/Edge boundary
# (build+start, never `next dev` — root Lesson 9). The headline spec is the
# cross-account collaborative isolation flow (the must-never-break one).
#
# Lands non-blocking first per docs/build-phases/upcoming/e2e-playwright-plan.md:
# the `api` project (no browser, deterministic) is the lane to promote to a
# required check once it has proven stable. The browser lane is added behind it.
#
# NOTE (first-run validation): like rls-tests.yml, this workflow is new. If the
# first run fails, the likely culprits are (a) a required env var the booted app
# validates that is not set below, or (b) a Playwright browser/deps install
# detail. Fix on the first red run rather than skipping the gate.

name: E2E (Playwright)

# Least privilege: this lane only reads the repo + runs tests against a throwaway
# local Supabase stack. No write scopes needed.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "apps/id/**"
      - "packages/**"
      - "supabase/migrations/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned to match rls-tests.yml (grant-default drift, see that file).
          version: 2.105.0

      - name: Start local Supabase (applies migrations)
        run: |
          test -f supabase/config.toml || supabase init
          supabase start

      - name: Export Supabase env
        run: |
          # `supabase status -o env` quotes every value (e.g. API_URL="http://...").
          # GitHub's $GITHUB_ENV parser copies the value verbatim (it does NOT strip
          # quotes), so prefix with SB_ *and* unwrap the surrounding quotes — otherwise
          # NEXT_PUBLIC_SUPABASE_URL would carry literal quotes and fail z.string().url()
          # at boot, reddening the lane before any test runs.
          supabase status -o env | sed -E 's/^([A-Z0-9_]+)="?(.*[^"])"?$/SB_\1=\2/' >> "$GITHUB_ENV"

      - name: Assemble app env
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${SB_API_URL}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${SB_ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SB_SERVICE_ROLE_KEY}"
            echo "INTERNAL_SERVICE_SECRET=$(openssl rand -hex 32)"
            echo "KINETIKS_ENCRYPTION_KEY=$(openssl rand -base64 32)"
            echo "KINETIKS_FIXTURES_ENABLED=true"
            echo "ANTHROPIC_API_KEY=sk-ant-e2e-stub"
            echo "NEXT_PUBLIC_APP_URL=http://127.0.0.1:3000"
          } >> "$GITHUB_ENV"

      - name: Build apps/id
        run: pnpm --filter @kinetiks/id build

      - name: Run E2E (api lane)
        run: pnpm --filter @kinetiks/id e2e --project=api

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/id/playwright-report
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop || true

  e2e-browser:
    # Non-required browser lane (per the e2e plan): drives the collaborative
    # reference surface in a real Chromium via the `setup` (login) + `chromium`
    # projects. Kept a separate job so the `e2e-api` check name stays stable;
    # promote this to required once it has proven stable.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (+ OS deps)
        run: pnpm --filter @kinetiks/id exec playwright install --with-deps chromium

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.105.0

      - name: Start local Supabase (applies migrations)
        run: |
          test -f supabase/config.toml || supabase init
          supabase start

      - name: Export Supabase env
        run: |
          supabase status -o env | sed -E 's/^([A-Z0-9_]+)="?(.*[^"])"?$/SB_\1=\2/' >> "$GITHUB_ENV"

      - name: Assemble app env
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${SB_API_URL}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${SB_ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SB_SERVICE_ROLE_KEY}"
            echo "INTERNAL_SERVICE_SECRET=$(openssl rand -hex 32)"
            echo "KINETIKS_ENCRYPTION_KEY=$(openssl rand -base64 32)"
            echo "KINETIKS_FIXTURES_ENABLED=true"
            echo "ANTHROPIC_API_KEY=sk-ant-e2e-stub"
            echo "NEXT_PUBLIC_APP_URL=http://127.0.0.1:3000"
          } >> "$GITHUB_ENV"

      - name: Build apps/id
        run: pnpm --filter @kinetiks/id build

      - name: Run E2E (browser lane)
        run: pnpm --filter @kinetiks/id e2e --project=chromium

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-browser
          path: apps/id/playwright-report
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop || true
