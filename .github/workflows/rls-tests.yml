# Cross-tenant RLS isolation gate.
#
# Boots a local Supabase stack, applies all migrations, and runs the
# pgTAP suites in supabase/tests/ via pg_prove. This is the durable
# guard for "RLS is the runtime tenant boundary" (Phase 1 of the
# desktop + RLS re-architecture). The cross-account isolation suites
# are the ones that must never go red.
#
# NOTE (first-run validation): this workflow is new and has not yet
# run on a GitHub runner. The repo had no supabase/config.toml, so
# `supabase init` generates one here. If the first run fails, the
# likely culprits are (a) a migration that assumes a hosted-only
# extension under the local stack, or (b) the init/start flags below.
# Fix on the first red run rather than skipping the gate.

name: RLS cross-tenant tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - "scripts/test-rls.sh"
      - ".github/workflows/rls-tests.yml"

jobs:
  pgtap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install pg_prove
        run: |
          sudo apt-get update
          sudo apt-get install -y libtap-parser-sourcehandler-pgtap-perl postgresql-client

      - name: Start local Supabase (applies migrations)
        run: |
          test -f supabase/config.toml || supabase init
          supabase start

      - name: Run cross-tenant pgTAP suites
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: ./scripts/test-rls.sh

      - name: Stop local Supabase
        if: always()
        run: supabase stop || true
