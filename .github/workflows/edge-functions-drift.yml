# Fails the PR if any function under supabase/functions/ is not deployed
# to the linked Supabase project (or if a deployed function has no
# corresponding folder in the repo).
#
# One-time setup: add a repo secret named `SUPABASE_ACCESS_TOKEN`. Get
# the value from supabase.com/dashboard/account/tokens. The CLI uses
# this exact env var to authenticate non-interactively.
#
# This workflow is the durable answer to "twelve functions in repo, zero
# deployed" — see CLAUDE.md Lessons §8.

name: Edge Functions drift check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "supabase/functions/**"
      - "scripts/functions-drift-check.sh"
      - "scripts/functions-deploy.sh"
      - ".github/workflows/edge-functions-drift.yml"

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Compare repo vs deployed
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: scripts/functions-drift-check.sh
