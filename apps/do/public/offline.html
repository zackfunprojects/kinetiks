<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DeskOf — Offline</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f1117;
        color: #f1f3f9;
        font-family: ui-sans-serif, system-ui, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 360px;
        text-align: center;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        margin: 0 0 16px;
        color: #a8b0c2;
      }
      a {
        color: #60a5fa;
        text-decoration: none;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You&rsquo;re offline</h1>
      <p>
        DeskOf can&rsquo;t reach the network right now. Any reply you were
        writing is still saved locally on this device — re-open the editor
        when you&rsquo;re back online and your draft will be there.
      </p>
      <a href="/">Try again</a>
    </div>
  </body>
</html>
